spring:
  ai:
    openai:
      # DeepSeek API密钥（从DeepSeek官网获取）
      api-key: ${DEEPSEEK_API_KEY}
      # DeepSeek的API基础URL
      base-url: https://api.deepseek.com
      chat:
        options:
          # DeepSeek支持的模型
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 2000